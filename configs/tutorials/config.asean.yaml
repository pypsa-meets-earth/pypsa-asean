# To run:
# snakemake solve_sector_networks --configfile configs/config.asean.yaml configs/tutorials/config.asean.yaml -call

tutorial: true

run:
  name: baseline-aims-3H-tutorial # use this to keep track of runs with different settings
  sector_name: baseline-aims-3H-tutorial

scenario:
  clusters: [50]
  planning_horizons:
  - 2030
  - 2040
  - 2050

snapshots:
  start: "2013-03-01"
  end: "2013-03-07"

countries: [BN, KH, ID, LA, MM, MY, PH, SG, TH, TL, VN]

atlite:
  default: asean-2013-era5-tutorial

sector:
  enable:
    land_transport: false # Ongoing issues for models with short timeframes

  solar_rooftop:
    use_building_size: false

solving:
  solver:
    name: highs
    options: highs-default
