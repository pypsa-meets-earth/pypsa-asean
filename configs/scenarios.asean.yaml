# ==== Tutorial Scenarios ====
# ============================

baseline-aims-3H-tutorial:
  tutorial: true

  scenario:
    clusters: [50]
    planning_horizons:
    - 2030
    - 2040
    - 2050

  snapshots:
    start: "2013-03-01"
    end: "2013-03-07"

  atlite:
    default: asean-2013-era5-tutorial

  sector:
    enable:
      land_transport: false # Ongoing issues for models with short timeframes

    solar_rooftop:
      use_building_size: false

  solving:
    solver:
      name: glpk
      options: glpk-default

# ==== Baseline Scenarios ====
# ============================

baseline-aims-3H:

baseline-asean-3H:
  transmission_projects:
    include:
      AIMS: false

baseline-existing-3H:
  transmission_projects:
    include:
      AIMS: false
      ID_SuperGrid: false

# ==== Decarbonization Scenarios ====
# ===================================

decarbonize-aims-3H:
  co2_budget:
    enable: true

decarbonize-asean-3H:
  co2_budget:
    enable: true

  transmission_projects:
    include:
      AIMS: false

decarbonize-existing-3H:
  co2_budget:
    enable: true

  transmission_projects:
    include:
      AIMS: false
      ID_SuperGrid: false

# ====== Sensitivity Scenarios ======
# ===================================

sensitivity-overnight-3H:
  scenario:
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

# ====== Clustering ======

sensitivity-50n-3H:
  scenario:
    clusters: 50
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

sensitivity-200n-3H:
  scenario:
    clusters: 200
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

# ====== Timesteps ======

sensitivity-1H:
  scenario:
    sopts:
    - "1h"
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

sensitivity-6H:
  scenario:
    sopts:
    - "6h"
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

# ====== Limit Rooftops ======

sensitivity-roof100-3H:
  scenario:
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

  sector:
    solar_rooftop:
      install_ratio:
        0: 0
        10: 0
        100: 0.36
        200: 0.41
        450: 0.49
        2300: 0.66

sensitivity-roof200-3H:
  scenario:
    planning_horizons:
    - 2050

  co2_budget:
    enable: true

  sector:
    solar_rooftop:
      install_ratio:
        0: 0
        10: 0
        100: 0
        200: 0.41
        450: 0.49
        2300: 0.66
